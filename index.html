<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Harmonium</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>HARMONIUM</h1>
    <div id="controls">
      <div class="control-group">
        <label>SCALE</label>
        <select id="scaleSelect"></select>
      </div>
      <div class="control-group">
        <label>OCTAVE</label>
        <div id="octaveDisplay">3</div>
      </div>
      <div class="control-group">
        <label>REVERB</label>
        <label class="toggle">
          <input type="checkbox" id="reverbToggle">
          <span class="slider"></span>
        </label>
      </div>
      <div class="control-group">
        <label>VOLUME</label>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
      </div>
    </div>
  </header>

  <main>
    <div id="keyboard-container">
      <div id="keyboard"></div>
    </div>
    <div id="key-legend">
      <div class="legend-row">
        <span class="legend-item"><kbd>Z</kbd>+key = lower octave</span>
        <span class="legend-item"><kbd>Shift</kbd>+key = higher octave</span>
      </div>
      <div class="legend-row sargam-row" id="sargamRow"></div>
    </div>
  </main>

  <div id="loading-overlay">
    <div id="loading-box">
      <div class="loading-spinner"></div>
      <p>Loading harmonium samples…</p>
    </div>
  </div>
</div>
<script src="harmonium.js"></script>
</body>
</html>
